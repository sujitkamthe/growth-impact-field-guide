<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#6B4FBB" stroke-width="1.5" opacity="0.3"/>
  <!-- Cardinal ticks -->
  <line x1="16" y1="2" x2="16" y2="5" stroke="#6B4FBB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="27" x2="16" y2="30" stroke="#6B4FBB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="5" y2="16" stroke="#6B4FBB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="16" x2="30" y2="16" stroke="#6B4FBB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Compass needle - north (accent color) -->
  <polygon points="16,5 13.5,16 16,14.5 18.5,16" fill="#6B4FBB"/>
  <!-- Compass needle - south (muted) -->
  <polygon points="16,27 13.5,16 16,17.5 18.5,16" fill="#2D3142" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#6B4FBB"/>
</svg>
